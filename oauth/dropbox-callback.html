<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTab Dropbox OAuth</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI Variable", "Roboto Flex", "Manrope", "Roboto", sans-serif;
            background: #f3f5fb;
            color: #1b1b1f;
            padding: 24px;
        }
        .card {
            width: min(460px, 100%);
            background: #ffffff;
            border: 1px solid rgba(28, 27, 31, 0.14);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 12px 28px rgba(28, 27, 31, 0.14);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 18px;
        }
        p {
            margin: 0;
            color: #605d68;
            line-height: 1.45;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Авторизация завершена</h1>
        <p>Окно можно закрыть. AirTab продолжит подключение автоматически.</p>
    </div>

    <script>
        (() => {
            const messageType = 'airtab-dropbox-oauth-callback';
            const oauthResultStorageKey = 'airtabDropboxOauthResult';
            const callbackUrl = window.location.href;
            const payload = { type: messageType, url: callbackUrl };
            const decodeStatePayload = (value) => {
                const raw = String(value || '').trim();
                if (!raw) return null;
                try {
                    const normalized = raw.replace(/-/g, '+').replace(/_/g, '/');
                    const padded = normalized + '='.repeat((4 - (normalized.length % 4)) % 4);
                    const decoded = atob(padded);
                    const bytes = Uint8Array.from(decoded, (char) => char.charCodeAt(0));
                    const text = new TextDecoder().decode(bytes);
                    const parsed = JSON.parse(text);
                    return parsed && typeof parsed === 'object' ? parsed : null;
                } catch (error) {
                    return null;
                }
            };
            const statePayload = decodeStatePayload(new URL(callbackUrl).searchParams.get('state'));
            const redirectFlow = statePayload?.flow === 'redirect';
            const safeReturnTo = (() => {
                const raw = String(statePayload?.returnTo || '').trim();
                if (!raw) return '';
                try {
                    const parsed = new URL(raw, window.location.href);
                    return parsed.origin === window.location.origin ? parsed.toString() : '';
                } catch (error) {
                    return '';
                }
            })();
            const notifyExtensionDirectly = async () => {
                const extensionId = String(statePayload?.extId || '').trim();
                if (!extensionId) return false;
                const runtimeApi = globalThis.chrome?.runtime;
                if (!runtimeApi?.sendMessage) return false;
                return await new Promise((resolve) => {
                    try {
                        runtimeApi.sendMessage(extensionId, payload, () => {
                            resolve(!runtimeApi.lastError);
                        });
                    } catch (error) {
                        resolve(false);
                    }
                });
            };
            if (redirectFlow) {
                try {
                    sessionStorage.setItem(oauthResultStorageKey, JSON.stringify({ url: callbackUrl }));
                } catch (error) {
                    // best effort
                }
                if (safeReturnTo) {
                    window.location.replace(safeReturnTo);
                    return;
                }
            }
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(payload, '*');
                }
            } catch (error) {
                // ignore cross-window messaging issues
            }
            Promise.resolve()
                .then(() => notifyExtensionDirectly())
                .catch(() => false)
                .finally(() => {
                    setTimeout(() => {
                        try { window.close(); } catch (error) {}
                    }, 220);
                });
        })();
    </script>
</body>
</html>
