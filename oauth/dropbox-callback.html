<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTab Dropbox OAuth</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI Variable", "Roboto Flex", "Manrope", "Roboto", sans-serif;
            background: #f3f5fb;
            color: #1b1b1f;
            padding: 24px;
        }
        .card {
            width: min(460px, 100%);
            background: #ffffff;
            border: 1px solid rgba(28, 27, 31, 0.14);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 12px 28px rgba(28, 27, 31, 0.14);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 18px;
        }
        p {
            margin: 0;
            color: #605d68;
            line-height: 1.45;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Авторизация завершена</h1>
        <p>Окно можно закрыть. AirTab продолжит подключение автоматически.</p>
    </div>

    <script>
        (() => {
            const messageType = 'airtab-dropbox-oauth-callback';
            const payload = { type: messageType, url: window.location.href };
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(payload, '*');
                }
            } catch (error) {
                // ignore cross-window messaging issues
            }
            setTimeout(() => {
                try { window.close(); } catch (error) {}
            }, 120);
        })();
    </script>
</body>
</html>
